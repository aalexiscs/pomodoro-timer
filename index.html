<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🍅 Pomodoro Timer</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍅</text></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="theme-pomodoro">

  <!-- Theme Toggle FAB (floating) -->
  <button class="theme-fab" id="themeToggle" title="Cambiar tema" aria-label="Cambiar tema oscuro/claro">
    <svg viewBox="0 0 24 24" fill="currentColor" width="22" height="22">
      <path d="M12 3a9 9 0 1 0 9 9c0-.46-.04-.92-.1-1.36a5.389 5.389 0 0 1-4.4 2.26 5.403 5.403 0 0 1-3.14-9.8c-.44-.06-.9-.1-1.36-.1z"/>
    </svg>
  </button>

  <!-- Main Content -->
  <main class="main-content">

    <!-- Mode Tabs -->
    <div class="tabs" role="tablist" aria-label="Modos del timer">
      <button class="tab active" id="tab-pomodoro" role="tab" aria-selected="true" data-mode="pomodoro" data-time="1500">
        🍅 Pomodoro
      </button>
      <button class="tab" id="tab-short" role="tab" aria-selected="false" data-mode="short" data-time="300">
        ☕ Descanso
      </button>
      <button class="tab" id="tab-long" role="tab" aria-selected="false" data-mode="long" data-time="900">
        🌙 Largo
      </button>
    </div>

    <!-- Timer Card -->
    <div class="card timer-card">

      <!-- SVG Progress Ring -->
      <div class="timer-ring-container" aria-live="polite" aria-label="Temporizador">
        <svg class="timer-ring" viewBox="0 0 220 220" width="220" height="220">
          <circle class="ring-bg" cx="110" cy="110" r="96" />
          <circle class="ring-progress" id="ringProgress" cx="110" cy="110" r="96"
            stroke-dasharray="603.19"
            stroke-dashoffset="0"
            transform="rotate(-90 110 110)" />
        </svg>
        <div class="timer-display">
          <span class="timer-time" id="timerDisplay">25:00</span>
          <span class="timer-label" id="timerLabel">Enfócate</span>
        </div>
      </div>

      <!-- Controls -->
      <div class="controls">
        <button class="icon-btn control-btn" id="resetBtn" title="Reiniciar" aria-label="Reiniciar timer">
          <svg viewBox="0 0 24 24" fill="currentColor" width="28" height="28">
            <path d="M12 5V1L7 6l5 5V7c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6H4c0 4.42 3.58 8 8 8s8-3.58 8-8-3.58-8-8-8z"/>
          </svg>
        </button>

        <button class="fab" id="startBtn" aria-label="Iniciar o pausar timer">
          <svg class="icon-play" viewBox="0 0 24 24" fill="currentColor" width="36" height="36">
            <path d="M8 5v14l11-7z"/>
          </svg>
          <svg class="icon-pause" viewBox="0 0 24 24" fill="currentColor" width="36" height="36" style="display:none">
            <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>
          </svg>
        </button>

        <button class="icon-btn control-btn" id="skipBtn" title="Saltar" aria-label="Saltar al siguiente modo">
          <svg viewBox="0 0 24 24" fill="currentColor" width="28" height="28">
            <path d="M6 18l8.5-6L6 6v12zm2-8.14L11.03 12 8 14.14V9.86zM16 6h2v12h-2z"/>
          </svg>
        </button>
      </div>

    </div>

    <!-- Stats Card -->
    <div class="card stats-card">
      <div class="stat-item">
        <span class="stat-value" id="pomodoroCount">0</span>
        <span class="stat-label">Pomodoros</span>
      </div>
      <div class="stat-divider"></div>
      <div class="stat-item">
        <span class="stat-value" id="focusTime">0 min</span>
        <span class="stat-label">Tiempo enfocado</span>
      </div>
      <div class="stat-divider"></div>
      <div class="stat-item">
        <span class="stat-value" id="sessionGoal">4</span>
        <span class="stat-label">Meta sesión</span>
      </div>
    </div>

    <!-- Pomodoro Dots -->
    <div class="pomodoro-dots" id="pomodoroDots" aria-label="Progreso de pomodoros">
      <div class="dot" data-index="0"></div>
      <div class="dot" data-index="1"></div>
      <div class="dot" data-index="2"></div>
      <div class="dot" data-index="3"></div>
    </div>

  </main>

  <!-- Footer -->
  <footer class="footer">
    <a class="footer__link" href="https://github.com/aalexiscs" target="_blank" rel="noopener noreferrer" aria-label="GitHub de aalexiscs">
      <svg class="footer__icon" viewBox="0 0 24 24" fill="currentColor" width="18" height="18" aria-hidden="true">
        <path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"/>
      </svg>
      <span class="footer__username">aalexiscs</span>
    </a>
  </footer>

  <!-- Snackbar -->
  <div class="snackbar" id="snackbar" role="status" aria-live="polite"></div>

  <script src="js/app.js"></script>
</body>
</html>
